version: "3.8"

services:
  # ─── Redis Cache ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: phishbone-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── .NET 8 API ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: phishbone-api
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: "User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Server=${POSTGRES_SERVER};Port=5432;Database=${POSTGRES_DB}"
      RedisSettings__ConnectionString: "redis:6379,abortConnect=false"
      RedisSettings__InstanceName: "pHishbone_"
      Supabase__Url: ${SUPABASE_URL}
      Supabase__Key: ${SUPABASE_KEY}
      Supabase__JwtSecret: ${SUPABASE_JWT_SECRET}
      CloudinarySettings__CloudName: ${CLOUDINARY_CLOUD_NAME}
      CloudinarySettings__ApiKey: ${CLOUDINARY_API_KEY}
      CloudinarySettings__ApiSecret: ${CLOUDINARY_API_SECRET}
      AiProviders__OpenRouter__BaseUrl: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      AiProviders__OpenRouter__ApiKey: ${OPENROUTER_API_KEY}
      AiProviders__Groq__BaseUrl: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      AiProviders__Groq__ApiKey: ${GROQ_API_KEY}
      RateLimiting__GlobalPermitLimit: ${RATE_LIMIT_GLOBAL:-100}
      RateLimiting__GlobalWindowSeconds: ${RATE_LIMIT_GLOBAL_WINDOW:-60}
      RateLimiting__AuthPermitLimit: ${RATE_LIMIT_AUTH:-5}
      RateLimiting__AuthWindowSeconds: ${RATE_LIMIT_AUTH_WINDOW:-60}
      Cors__AllowedOrigins__0: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend (Vite + Nginx) ─────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: phishbone-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
